root = "."
tmp_dir = "/tmp/learning-buddy-air"

[build]
cmd = "go build -o /tmp/learning-buddy-air/backend ."
entrypoint = ["/tmp/learning-buddy-air/backend"]
include_ext = ["go"]
exclude_dir = ["data", "tmp", "vendor"]
delay = 300
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"

[log]
time = true

[misc]
clean_on_exit = true
