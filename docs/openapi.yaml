openapi: 3.0.3
info:
  title: Learning Buddy API
  version: 1.0.0
  description: Backend REST/SSE contract shared by Go handlers and the frontend.
servers:
  - url: /
paths:
  /health:
    get:
      operationId: health
      responses:
        '200':
          description: Database is ready.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }
        '503': { description: Database is unavailable. }
  /api/auth/login:
    post:
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Authenticated user and short-lived access token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401': { description: Invalid credentials. }
  /api/auth/refresh:
    post:
      operationId: refresh
      responses:
        '200':
          description: Rotated access token; refresh token is an httpOnly cookie.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AccessTokenResponse' }
        '401': { description: Invalid or replayed refresh token. }
  /api/agent/chat:
    post:
      operationId: chat
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChatRequest' }
      responses:
        '200':
          description: Server-sent events stream.
          content:
            text/event-stream: { schema: { type: string } }
        '401': { description: Missing or invalid access token. }
        '429': { description: User rate limit or daily quota exceeded. }
  /api/agent/plan:
    post:
      operationId: createPlan
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlanRequest' }
      responses:
        '200': { description: Created study plan. }
        '429': { description: User rate limit or daily quota exceeded. }
  /api/agent/quiz:
    post:
      operationId: createQuiz
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuizRequest' }
      responses:
        '200': { description: Generated exercises without answer keys. }
        '429': { description: User rate limit or daily quota exceeded. }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties: { status: { type: string, enum: [ok] } }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 6 }
    User:
      type: object
      properties:
        ID: { type: integer, format: int64 }
        Email: { type: string, format: email }
        DisplayName: { type: string }
        Role: { type: string }
        Subscription: { type: string }
        CreatedAt: { type: string, format: date-time }
    AuthResponse:
      type: object
      required: [user, access_token]
      properties:
        user: { $ref: '#/components/schemas/User' }
        access_token: { type: string }
    AccessTokenResponse:
      type: object
      required: [access_token]
      properties: { access_token: { type: string } }
    ChatRequest:
      type: object
      required: [question]
      properties:
        question: { type: string, minLength: 1 }
        session_id: { type: string }
        material_id: { type: integer, format: int64, nullable: true }
    PlanRequest:
      type: object
      required: [goal]
      properties:
        goal: { type: string, minLength: 1 }
        deadline: { type: string, format: date, nullable: true }
        title: { type: string }
    QuizRequest:
      type: object
      required: [topic]
      properties:
        topic: { type: string }
        material_id: { type: integer, format: int64, nullable: true }
        count: { type: integer, minimum: 1, maximum: 10 }
