# learning_buddy 本地基础设施 + 三服务
# 启动仅基础设施：docker compose up -d db redis minio
# 启动全栈：docker compose up

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: learning
      POSTGRES_PASSWORD: learning
      POSTGRES_DB: learning_buddy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learning"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  backend:
    build: ./backend
    environment:
      DB_DSN: postgres://learning:learning@db:5432/learning_buddy?sslmode=disable
      REDIS_ADDR: redis:6379
      AGENT_BASE_URL: http://agent:8000
      AGENT_SHARED_SECRET: ${AGENT_SHARED_SECRET:?AGENT_SHARED_SECRET must be set}
      MINIO_ENDPOINT: minio:9000
      MINIO_BUCKET: materials
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  agent:
    build: ./agent
    environment:
      PG_DSN: postgres://learning:learning@db:5432/learning_buddy
      REDIS_ADDR: redis:6379
      EMBEDDING_DIM: "1024"
      AGENT_SHARED_SECRET: ${AGENT_SHARED_SECRET:?AGENT_SHARED_SECRET must be set}
    ports:
      - "8000:8000" # 仅本地验收；生产部署应仅暴露容器内网
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  miniodata:
